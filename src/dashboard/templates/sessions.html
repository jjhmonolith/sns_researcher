<!DOCTYPE html>
<html lang="ko" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Research Agent — Sessions</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #030712; color: #e5e7eb; }
    </style>
</head>
<body class="min-h-screen">
    <header class="bg-gray-900 border-b border-gray-800 px-6 py-4">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <div>
                <h1 class="text-xl font-bold text-white">Research Agent</h1>
                <p class="text-sm text-gray-400 mt-0.5">Multi-Session Research Service</p>
            </div>
            <button onclick="openCreateModal()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-lg transition">
                + New Session
            </button>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-8">
        <div id="sessions-list" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-full text-center text-gray-600 py-12">Loading sessions...</div>
        </div>
    </main>

    <!-- Create Session Modal -->
    <div id="create-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)closeCreateModal()">
        <div class="bg-gray-900 rounded-xl border border-gray-700 w-full max-w-lg" onclick="event.stopPropagation()">
            <div class="px-5 py-4 border-b border-gray-700">
                <h2 class="text-lg font-semibold text-white">New Research Session</h2>
            </div>
            <div class="p-5 space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Session Name</label>
                    <input id="inp-name" type="text" placeholder="e.g. Enterprise AX Research" class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Topic Description</label>
                    <textarea id="inp-topic" rows="4" placeholder="어떤 주제를 탐색할지 설명하세요. 관련/비관련 기준도 적어주세요." class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:border-blue-500 focus:outline-none resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-1">Search Keywords <span class="text-gray-600">(comma separated)</span></label>
                    <input id="inp-keywords" type="text" placeholder="AI transformation, enterprise AI, ..." class="w-full bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm text-gray-200 focus:border-blue-500 focus:outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-400 mb-2">Platforms</label>
                    <div class="flex gap-3">
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input id="chk-linkedin" type="checkbox" checked class="accent-blue-500">
                            <span class="text-sm text-gray-300">LinkedIn</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input id="chk-x" type="checkbox" class="accent-blue-500">
                            <span class="text-sm text-gray-300">X (Twitter)</span>
                        </label>
                        <label class="flex items-center gap-2 cursor-pointer">
                            <input id="chk-fb" type="checkbox" class="accent-blue-500">
                            <span class="text-sm text-gray-300">Facebook</span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="px-5 py-4 border-t border-gray-700 flex justify-end gap-3">
                <button onclick="closeCreateModal()" class="px-4 py-2 text-sm text-gray-400 hover:text-gray-200 transition">Cancel</button>
                <button onclick="createSession()" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm rounded-lg transition">Create</button>
            </div>
        </div>
    </div>

    <script>
    function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

    async function loadSessions() {
        try {
            const res = await fetch('/api/sessions');
            const sessions = await res.json();
            const container = document.getElementById('sessions-list');

            if (!sessions.length) {
                container.innerHTML = `<div class="col-span-full text-center py-12">
                    <div class="text-gray-500 text-lg mb-2">No sessions yet</div>
                    <div class="text-gray-600 text-sm">Click "+ New Session" to create your first research session.</div>
                </div>`;
                return;
            }

            container.innerHTML = sessions.map(s => {
                const statusColors = {
                    running: 'bg-green-500/20 text-green-400',
                    stopped: 'bg-gray-700 text-gray-400',
                    error: 'bg-red-500/20 text-red-400',
                };
                const statusClass = statusColors[s.status] || statusColors.stopped;
                const platforms = s.platforms.map(p => p === 'x' ? '𝕏' : p === 'facebook' ? 'fb' : 'in').join(' + ');
                const kw = (s.keywords || []).slice(0, 3).join(', ');

                return `<div class="bg-gray-900 rounded-xl border border-gray-800 p-5 hover:border-gray-600 transition">
                    <div class="flex items-start justify-between mb-3">
                        <a href="/session/${esc(s.id)}" class="text-lg font-semibold text-white hover:text-blue-400 transition">${esc(s.name)}</a>
                        <span class="px-2 py-0.5 rounded-full text-xs font-medium ${statusClass}">${s.is_running ? 'Running' : s.status}</span>
                    </div>
                    <p class="text-sm text-gray-400 mb-3 line-clamp-2">${esc(s.topic_description)}</p>
                    <div class="flex items-center gap-3 text-xs text-gray-500 mb-4">
                        <span class="font-medium">${platforms}</span>
                        ${kw ? `<span class="truncate">${esc(kw)}</span>` : ''}
                    </div>
                    <div class="flex gap-2">
                        ${s.is_running
                            ? `<button onclick="stopSession('${esc(s.id)}')" class="px-3 py-1.5 bg-red-600/20 text-red-400 hover:bg-red-600/40 text-xs rounded-lg transition">Stop</button>`
                            : `<button onclick="startSession('${esc(s.id)}')" class="px-3 py-1.5 bg-green-600/20 text-green-400 hover:bg-green-600/40 text-xs rounded-lg transition">Start</button>`}
                        <a href="/session/${esc(s.id)}" class="px-3 py-1.5 bg-gray-800 text-gray-300 hover:bg-gray-700 text-xs rounded-lg transition">Dashboard</a>
                        ${!s.is_running ? `<button onclick="deleteSession('${esc(s.id)}')" class="px-3 py-1.5 text-gray-600 hover:text-red-400 text-xs transition ml-auto">Delete</button>` : ''}
                    </div>
                </div>`;
            }).join('');
        } catch(e) { console.error(e); }
    }

    async function createSession() {
        const name = document.getElementById('inp-name').value.trim();
        const topic = document.getElementById('inp-topic').value.trim();
        const keywords = document.getElementById('inp-keywords').value.split(',').map(k => k.trim()).filter(Boolean);
        const platforms = [];
        if (document.getElementById('chk-linkedin').checked) platforms.push('linkedin');
        if (document.getElementById('chk-x').checked) platforms.push('x');
        if (document.getElementById('chk-fb').checked) platforms.push('facebook');

        if (!name) { alert('Session name is required.'); return; }
        if (!topic) { alert('Topic description is required.'); return; }
        if (!platforms.length) { alert('Select at least one platform.'); return; }

        try {
            const res = await fetch('/api/sessions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ name, topic_description: topic, keywords, platforms }),
            });
            const data = await res.json();
            if (data.ok) {
                closeCreateModal();
                loadSessions();
            }
        } catch(e) { console.error(e); }
    }

    async function startSession(id) {
        try {
            await fetch(`/api/sessions/${id}/start`, { method: 'POST' });
            setTimeout(loadSessions, 1000);
        } catch(e) { console.error(e); }
    }

    async function stopSession(id) {
        if (!confirm('Stop this session?')) return;
        try {
            await fetch(`/api/sessions/${id}/stop`, { method: 'POST' });
            setTimeout(loadSessions, 2000);
        } catch(e) { console.error(e); }
    }

    async function deleteSession(id) {
        if (!confirm('Delete this session and all its data?')) return;
        try {
            await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
            loadSessions();
        } catch(e) { console.error(e); }
    }

    function openCreateModal() { document.getElementById('create-modal').classList.remove('hidden'); }
    function closeCreateModal() {
        document.getElementById('create-modal').classList.add('hidden');
        document.getElementById('inp-name').value = '';
        document.getElementById('inp-topic').value = '';
        document.getElementById('inp-keywords').value = '';
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeCreateModal(); });

    loadSessions();
    setInterval(loadSessions, 10000);
    </script>
</body>
</html>
